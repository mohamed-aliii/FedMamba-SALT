# =============================================================================
# FedMamba-SALT -- Retina Centralized Experiment Configuration
# =============================================================================
#
# Load this file with:
#   python train_centralized.py --config configs/retina_centralized.yaml
#
# Values here act as defaults.  Any CLI flag overrides the corresponding
# YAML key.  For example:
#   python train_centralized.py --config configs/retina_centralized.yaml --epochs 50
# will use epochs=50, overriding the 100 below.
#
# Keys that do not correspond to train_centralized.py arguments (e.g.
# evaluation-only settings) are silently skipped during loading.
# =============================================================================

# -- Data --
data_path: "/path/to/retina"          # Change to actual dataset root
                                       # Must have train/ subdirectory

# -- Teacher checkpoint --
teacher_ckpt: "data/ckpts/mae_vit_base.pth"

# -- Output --
output_dir: "outputs/retina_centralized"

# -- Training --
epochs: 100
batch_size: 256
lr: 5.0e-4
weight_decay: 0.05

# -- Infrastructure --
num_workers: 10
save_every: 10
device: "cuda"

# =============================================================================
# Reference-only settings (NOT loaded by train_centralized.py)
# =============================================================================
# These keys are used by eval/linear_probe.py and scripts, not by the
# training script.  They are kept here for documentation purposes.
#
#   num_classes:    5              # Retina: 5 disease categories
#   warmup_epochs:  10             # Linear warmup: lr/10 -> lr
#   patch_size:     16             # Student architecture
#   embed_dim:      256
#   depth:          4
#   out_dim:        768
#   eval_mode:      linear_probe   # or full_finetune
#   eval_epochs:    50
#   eval_batch_size: 256
#   eval_lr:        1.0e-3

# =============================================================================
# Expected training behavior (healthy run)
# =============================================================================
# Loss = 1 - cosine_similarity  (range [0, 2])
# Epoch   1:  loss ~ 0.9-1.0   (random init, cosine sim near 0)
# Epoch  10:  loss ~ 0.4-0.7   (warmup complete, student starting to align)
# Epoch  30:  loss ~ 0.15-0.4
# Epoch 100:  loss ~ 0.05-0.2  (plateau)
#
# embedding_std should stay ABOVE 0.1 throughout.
# If it drops below 0.05 -> representation collapse, stop and debug.
#
# Success criteria:
#   1. Final loss < 0.3
#   2. embedding_std never < 0.05
#   3. Linear probe accuracy within 5% of Fed-MAE baseline (77.43%)
# =============================================================================
