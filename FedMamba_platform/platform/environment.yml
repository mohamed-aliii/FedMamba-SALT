      - sse-starlette>=2.1.0
      - alembic>=1.13.0
      - psycopg2-binary>=2.9.9
      - aiosqlite>=0.20.0
      - pytest>=8.2.0
      - pytest-asyncio>=0.23.0
      - timm==0.3.2
      - einops
      - PyYAML
      - matplotlib
